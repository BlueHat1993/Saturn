services:
  neo4j:
    image: neo4j:5.26.8
    container_name: neo4j-saturn
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/nilava1993
      - NEO4J_PLUGINS=["graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=gds.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*
    volumes:
      - ./volumes/neo4j/data:/data
      - ./volumes/neo4j/logs:/logs

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-saturn
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage

# Using host bind mounts under ./volumes so data lives inside the project folder